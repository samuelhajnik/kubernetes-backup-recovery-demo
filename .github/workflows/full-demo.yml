name: Full demo verification

on:
  workflow_dispatch:

jobs:
  full-demo:
    name: Full demo verification
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind and kubectl
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Make scripts executable
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh

      - name: Run full backup/restore demo (--compare)
        run: |
          set -euo pipefail
          ./scripts/run-backup-recovery-demo.sh --compare
